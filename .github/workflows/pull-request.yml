# Runs on every pull request (any branch). Fails fast on bad formatting, then runs clippy + tests on all OSes.
# If rustfmt would fix files, opens a follow-up PR into the PR head branch (same-repo PRs only).

name: Pull request

on:
  pull_request:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# write: required so the rustfmt bot can push a branch; PRs: open the follow-up PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  format:
    name: Format (rustfmt --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          shared-key: workspace-${{ runner.os }}
          workspaces: |
            . -> target

      - name: cargo fmt --check
        id: fmt
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Apply rustfmt and open a PR into this PR branch
        if: >
          steps.fmt.outcome == 'failure' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: cargo fmt --all

      - name: Create pull request with formatting fixes
        if: >
          steps.fmt.outcome == 'failure' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: apply rustfmt"
          branch: automated/rustfmt-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
          base: ${{ github.event.pull_request.head.ref }}
          title: "[bot] rustfmt for PR #${{ github.event.pull_request.number }}"
          body: |
            This PR applies `cargo fmt` so the formatting check on PR #${{ github.event.pull_request.number }} can pass.

            Merge this PR into `${{ github.event.pull_request.head.ref }}`, then re-run CI on the original PR.

            _(Opened automatically because `cargo fmt --check` failed.)_

      - name: Fail if formatting was wrong
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::error::Formatting check failed. Fix locally with: cargo fmt --all"
          exit 1

  rust:
    name: Clippy + test (${{ matrix.os }})
    needs: format
    if: success()
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          shared-key: workspace-${{ runner.os }}
          workspaces: |
            . -> target

      - name: Install Vulkan (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace
